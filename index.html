<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CrimsonChat AI</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {}
            }
        }
    </script>

    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    
    <!-- Babel for JSX compilation in the browser -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        /* Custom Scrollbar Styles */
        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background-color: rgba(220, 38, 38, 0.2);
            border-radius: 20px;
        }
        .dark .custom-scrollbar::-webkit-scrollbar-thumb {
            background-color: rgba(153, 27, 27, 0.4);
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background-color: rgba(220, 38, 38, 0.4);
        }

        /* Fallback animations for Tailwind */
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideInBottom { from { transform: translateY(10px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .animate-fade-in { animation: fadeIn 0.3s ease-in-out; }
        .animate-slide-in { animation: slideInBottom 0.3s ease-out; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- Inline Icon Component (Replaces lucide-react for standalone usage) ---
        const Icon = ({ name, size = 24, className = "" }) => {
            const icons = {
                Send: <><path d="m22 2-7 20-4-9-9-4Z"/><path d="M22 2 11 13"/></>,
                Paperclip: <path d="m21.44 11.05-9.19 9.19a6 6 0 0 1-8.49-8.49l8.57-8.57A4 4 0 1 1 18 8.84l-8.59 8.57a2 2 0 0 1-2.83-2.83l8.49-8.48"/>,
                ImageIcon: <><rect width="18" height="18" x="3" y="3" rx="2" ry="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"/></>,
                FileText: <><path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z"/><path d="M14 2v4a2 2 0 0 0 2 2h4"/><path d="M10 9H8"/><path d="M16 13H8"/><path d="M16 17H8"/></>,
                Check: <path d="M20 6 9 17l-5-5"/>,
                CheckCheck: <><path d="M18 6 7 17l-5-5"/><path d="m22 10-7.5 7.5L13 16"/></>,
                Menu: <><line x1="4" x2="20" y1="12" y2="12"/><line x1="4" x2="20" y1="6" y2="6"/><line x1="4" x2="20" y1="18" y2="18"/></>,
                X: <><path d="M18 6 6 18"/><path d="m6 6 12 12"/></>,
                Sun: <><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></>,
                Moon: <path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/>,
                User: <><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></>,
                Bot: <><path d="M12 8V4H8"/><rect width="16" height="12" x="4" y="8" rx="2"/><path d="M2 14h2"/><path d="M20 14h2"/><path d="M15 13v2"/><path d="M9 13v2"/></>,
                Download: <><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></>,
                Plus: <><path d="M5 12h14"/><path d="M12 5v14"/></>,
                MessageSquare: <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>,
                MoreVertical: <><circle cx="12" cy="12" r="1"/><circle cx="12" cy="5" r="1"/><circle cx="12" cy="19" r="1"/></>,
                XCircle: <><circle cx="12" cy="12" r="10"/><path d="m15 9-6 6"/><path d="m9 9 6 6"/></>
            };
            return (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {icons[name]}
                </svg>
            );
        };

        // --- Mock Data & Initial State ---
        const INITIAL_MESSAGES = [
            {
                id: '1',
                sender: 'bot',
                text: "Hello! I'm your AI assistant. How can I help you today?",
                timestamp: new Date(Date.now() - 60000),
                status: 'seen'
            }
        ];

        const CHAT_HISTORY = [
            { id: 1, title: 'Website Redesign Ideas', date: 'Today' },
            { id: 2, title: 'React Performance Tips', date: 'Yesterday' },
            { id: 3, title: 'Marketing Copy Draft', date: 'Previous 7 Days' },
        ];

        function App() {
            // --- State Management ---
            const [theme, setTheme] = useState('dark');
            const [sidebarOpen, setSidebarOpen] = useState(false);
            const [messages, setMessages] = useState(INITIAL_MESSAGES);
            const [inputValue, setInputValue] = useState('');
            const [isTyping, setIsTyping] = useState(false);
            const [attachments, setAttachments] = useState([]);
            const [isDragging, setIsDragging] = useState(false);
            
            const messagesEndRef = useRef(null);
            const fileInputRef = useRef(null);
            const imageInputRef = useRef(null);

            // --- Effects ---
            // Auto-scroll to bottom
            useEffect(() => {
                messagesEndRef.current?.scrollIntoView({ behavior: 'smooth' });
            }, [messages, isTyping]);

            // Apply theme to body (for full bleed)
            useEffect(() => {
                if (theme === 'dark') {
                    document.documentElement.classList.add('dark');
                } else {
                    document.documentElement.classList.remove('dark');
                }
            }, [theme]);

            // --- Handlers ---
            const toggleTheme = () => setTheme(theme === 'dark' ? 'light' : 'dark');

            const handleSend = async (e) => {
                e?.preventDefault();
                if (!inputValue.trim() && attachments.length === 0) return;

                const newUserMsg = {
                    id: Date.now().toString(),
                    sender: 'user',
                    text: inputValue.trim(),
                    attachments: [...attachments],
                    timestamp: new Date(),
                    status: 'sent'
                };

                setMessages(prev => [...prev, newUserMsg]);
                setInputValue('');
                setAttachments([]);

                // Simulate message status updates
                setTimeout(() => {
                    setMessages(prev => 
                        prev.map(m => m.id === newUserMsg.id ? { ...m, status: 'delivered' } : m)
                    );
                }, 1000);

                setTimeout(() => {
                    setMessages(prev => 
                        prev.map(m => m.id === newUserMsg.id ? { ...m, status: 'seen' } : m)
                    );
                }, 2000);

                // Simulate Bot Response
                // 🔥 REAL BACKEND CALL
const userText = inputValue.trim();

setIsTyping(true);

try {
  const res = await fetch("https://chatbot-backend-eqi8.onrender.com/chat", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ message: userText })
  });

  const data = await res.json();

  setIsTyping(false);

  const newBotMsg = {
    id: (Date.now() + 1).toString(),
    sender: 'bot',
    text: data.reply || "No response from AI",
    timestamp: new Date(),
    status: 'seen'
  };

  setMessages(prev => [...prev, newBotMsg]);

} catch (error) {
  console.error("Frontend error:", error);

  setIsTyping(false);

  const errorMsg = {
    id: (Date.now() + 1).toString(),
    sender: 'bot',
    text: "⚠️ Failed to connect to AI server",
    timestamp: new Date(),
    status: 'seen'
  };

  setMessages(prev => [...prev, errorMsg]);
}
            };

            const handleFileUpload = (e) => {
                const files = Array.from(e.target.files);
                processFiles(files);
            };

            const processFiles = (files) => {
                const newAttachments = files.map(file => ({
                    id: Date.now() + Math.random().toString(),
                    file,
                    type: file.type.startsWith('image/') ? 'image' : 'file',
                    url: URL.createObjectURL(file),
                    name: file.name,
                    size: (file.size / 1024).toFixed(1) + ' KB'
                }));
                setAttachments(prev => [...prev, ...newAttachments]);
            };

            const removeAttachment = (id) => {
                setAttachments(prev => prev.filter(att => att.id !== id));
            };

            // Drag and Drop handlers
            const handleDragOver = (e) => {
                e.preventDefault();
                setIsDragging(true);
            };
            const handleDragLeave = (e) => {
                e.preventDefault();
                setIsDragging(false);
            };
            const handleDrop = (e) => {
                e.preventDefault();
                setIsDragging(false);
                if (e.dataTransfer.files && e.dataTransfer.files.length > 0) {
                    processFiles(Array.from(e.dataTransfer.files));
                }
            };

            // --- Formatters ---
            const formatTime = (date) => {
                return new Intl.DateTimeFormat('en-US', { hour: 'numeric', minute: 'numeric', hour12: true }).format(date);
            };

            return (
                <div className={`flex h-screen w-full antialiased font-sans transition-colors duration-300 ${theme === 'dark' ? 'dark bg-[#0a0303] text-gray-200' : 'bg-[#fcf8f8] text-gray-800'}`}>
                
                {/* --- Sidebar (Desktop & Mobile) --- */}
                <div className={`
                    fixed inset-y-0 left-0 z-40 w-72 transform transition-transform duration-300 ease-in-out flex flex-col
                    dark:bg-[#120606]/90 bg-white/90 backdrop-blur-xl border-r dark:border-red-900/20 border-red-100
                    md:relative md:translate-x-0
                    ${sidebarOpen ? 'translate-x-0 shadow-2xl' : '-translate-x-full'}
                `}>
                    {/* Sidebar Header */}
                    <div className="p-4 flex items-center justify-between h-16 border-b dark:border-red-900/20 border-red-100">
                    <div className="flex items-center gap-3">
                        <div className="w-8 h-8 rounded-xl bg-gradient-to-br from-red-500 to-red-700 flex items-center justify-center text-white shadow-lg shadow-red-500/20">
                        <Icon name="Bot" size={20} />
                        </div>
                        <span className="font-bold text-lg tracking-tight bg-gradient-to-r from-red-500 to-red-800 dark:from-red-400 dark:to-red-600 bg-clip-text text-transparent">
                        CrimsonAI
                        </span>
                    </div>
                    <button onClick={() => setSidebarOpen(false)} className="md:hidden p-2 rounded-lg hover:bg-red-50 dark:hover:bg-red-900/20 text-gray-500 dark:text-gray-400">
                        <Icon name="X" size={20} />
                    </button>
                    </div>

                    {/* New Chat Button */}
                    <div className="p-4">
                    <button className="w-full flex items-center gap-2 px-4 py-3 bg-white dark:bg-[#1a0a0a] border border-red-200 dark:border-red-900/30 rounded-xl hover:border-red-400 dark:hover:border-red-700 hover:shadow-md transition-all text-sm font-medium dark:text-red-100 text-red-900 group">
                        <Icon name="Plus" size={18} className="text-red-500 group-hover:rotate-90 transition-transform duration-300" />
                        New Chat
                    </button>
                    </div>

                    {/* Chat History */}
                    <div className="flex-1 overflow-y-auto px-3 py-2 custom-scrollbar">
                    <div className="text-xs font-semibold text-gray-400 dark:text-gray-500 uppercase tracking-wider mb-3 px-3">Recent</div>
                    {CHAT_HISTORY.map((chat) => (
                        <button key={chat.id} className="w-full flex items-center gap-3 px-3 py-2.5 rounded-lg hover:bg-red-50 dark:hover:bg-red-900/20 transition-colors text-left group mb-1">
                        <Icon name="MessageSquare" size={16} className="text-gray-400 group-hover:text-red-500 transition-colors" />
                        <span className="text-sm truncate flex-1 dark:text-gray-300 text-gray-700">{chat.title}</span>
                        </button>
                    ))}
                    </div>

                    {/* Sidebar Footer (Profile/Settings) */}
                    <div className="p-4 border-t dark:border-red-900/20 border-red-100 flex items-center justify-between">
                    <div className="flex items-center gap-3 cursor-pointer">
                        <div className="w-9 h-9 rounded-full bg-red-100 dark:bg-red-900/30 flex items-center justify-center text-red-600 dark:text-red-400 border border-red-200 dark:border-red-800">
                        <Icon name="User" size={18} />
                        </div>
                        <div className="text-sm font-medium">Guest User</div>
                    </div>
                    <button className="p-2 text-gray-400 hover:text-gray-600 dark:hover:text-gray-200 transition-colors">
                        <Icon name="MoreVertical" size={18} />
                    </button>
                    </div>
                </div>

                {/* Mobile Overlay */}
                {sidebarOpen && (
                    <div 
                    className="fixed inset-0 bg-black/50 backdrop-blur-sm z-30 md:hidden transition-opacity"
                    onClick={() => setSidebarOpen(false)}
                    />
                )}

                {/* --- Main Chat Area --- */}
                <div className="flex-1 flex flex-col relative h-full w-full max-w-full overflow-hidden bg-white dark:bg-[#0c0404]">
                    
                    {/* Top Navbar */}
                    <header className="h-16 flex items-center justify-between px-4 sm:px-6 border-b dark:border-red-900/20 border-red-100 bg-white/80 dark:bg-[#0c0404]/80 backdrop-blur-md z-20 shrink-0">
                    <div className="flex items-center gap-3">
                        <button 
                        onClick={() => setSidebarOpen(true)}
                        className="md:hidden p-2 -ml-2 rounded-lg hover:bg-red-50 dark:hover:bg-red-900/20 text-gray-600 dark:text-gray-300"
                        >
                        <Icon name="Menu" size={24} />
                        </button>
                        <div className="flex flex-col">
                        <h1 className="text-lg font-semibold dark:text-gray-100 text-gray-800">Website Redesign Ideas</h1>
                        <span className="text-xs text-red-500 dark:text-red-400 flex items-center gap-1">
                            <span className="w-1.5 h-1.5 rounded-full bg-red-500 animate-pulse"></span>
                            AI is ready
                        </span>
                        </div>
                    </div>
                    <button 
                        onClick={toggleTheme}
                        className="p-2 rounded-full hover:bg-red-50 dark:hover:bg-red-900/30 text-gray-500 dark:text-gray-400 transition-colors"
                    >
                        {theme === 'dark' ? <Icon name="Sun" size={20} /> : <Icon name="Moon" size={20} />}
                    </button>
                    </header>

                    {/* Messages Container */}
                    <div 
                    className="flex-1 overflow-y-auto p-4 sm:p-6 pb-32 sm:pb-40 custom-scrollbar relative"
                    onDragOver={handleDragOver}
                    onDragLeave={handleDragLeave}
                    onDrop={handleDrop}
                    >
                    {/* Drag & Drop Overlay */}
                    {isDragging && (
                        <div className="absolute inset-0 z-50 bg-red-50/90 dark:bg-[#1a0a0a]/90 backdrop-blur-sm border-2 border-dashed border-red-500 m-4 rounded-2xl flex flex-col items-center justify-center animate-fade-in">
                        <div className="w-20 h-20 bg-red-100 dark:bg-red-900/50 rounded-full flex items-center justify-center mb-4 text-red-600 dark:text-red-400">
                            <Icon name="FileText" size={40} />
                        </div>
                        <h3 className="text-2xl font-bold text-red-900 dark:text-red-100 mb-2">Drop files here</h3>
                        <p className="text-red-600 dark:text-red-400">Supports images, PDFs, and text documents</p>
                        </div>
                    )}

                    <div className="max-w-4xl mx-auto space-y-6">
                        {messages.map((msg) => (
                        <div key={msg.id} className={`flex gap-4 ${msg.sender === 'user' ? 'justify-end' : 'justify-start'} animate-slide-in`}>
                            
                            {/* Bot Avatar */}
                            {msg.sender === 'bot' && (
                            <div className="w-8 h-8 sm:w-10 sm:h-10 shrink-0 rounded-full bg-gradient-to-br from-red-100 to-red-200 dark:from-red-900/40 dark:to-[#2a0f0f] border border-red-200 dark:border-red-800 flex items-center justify-center text-red-600 dark:text-red-400 mt-auto mb-2 shadow-sm">
                                <Icon name="Bot" size={20} />
                            </div>
                            )}

                            {/* Message Bubble Structure */}
                            <div className={`flex flex-col gap-1 max-w-[85%] sm:max-w-[75%] ${msg.sender === 'user' ? 'items-end' : 'items-start'}`}>
                            
                            {/* Name Tag (Optional, usually for group chats but good for clarity) */}
                            <span className="text-[11px] font-medium text-gray-400 px-1">
                                {msg.sender === 'user' ? 'You' : 'CrimsonAI'}
                            </span>

                            {/* Bubble Content */}
                            <div className={`
                                relative group px-4 sm:px-5 py-3 rounded-2xl shadow-sm text-[15px] leading-relaxed
                                ${msg.sender === 'user' 
                                ? 'bg-gradient-to-br from-red-600 to-red-700 dark:from-red-700 dark:to-red-900 text-white rounded-br-sm shadow-red-600/20' 
                                : 'bg-white dark:bg-[#1a0a0a] border border-gray-100 dark:border-red-900/30 text-gray-800 dark:text-gray-200 rounded-bl-sm'
                                }
                            `}>
                                
                                {/* Render Attachments if any */}
                                {msg.attachments && msg.attachments.length > 0 && (
                                <div className="flex flex-wrap gap-2 mb-3">
                                    {msg.attachments.map(att => (
                                    att.type === 'image' ? (
                                        <div key={att.id} className="relative rounded-lg overflow-hidden border border-white/20 group/img cursor-pointer">
                                        <img src={att.url} alt="attachment" className="w-48 h-auto object-cover hover:scale-105 transition-transform duration-300" />
                                        <div className="absolute inset-0 bg-black/0 group-hover/img:bg-black/20 flex items-center justify-center transition-colors">
                                            <Icon name="Download" size={24} className="text-white opacity-0 group-hover/img:opacity-100 transition-opacity drop-shadow-md" />
                                        </div>
                                        </div>
                                    ) : (
                                        <div key={att.id} className="flex items-center gap-3 bg-black/10 dark:bg-white/5 p-2.5 rounded-lg border border-white/10 w-full sm:w-64 cursor-pointer hover:bg-black/20 dark:hover:bg-white/10 transition-colors">
                                        <div className="p-2 bg-white/20 rounded text-white"><Icon name="FileText" size={20}/></div>
                                        <div className="flex-1 min-w-0">
                                            <p className="text-sm font-medium truncate text-white">{att.name}</p>
                                            <p className="text-xs text-white/70">{att.size}</p>
                                        </div>
                                        <Icon name="Download" size={16} className="text-white/70 hover:text-white" />
                                        </div>
                                    )
                                    ))}
                                </div>
                                )}

                                {/* Text Content */}
                                <p className="whitespace-pre-wrap">{msg.text}</p>
                            </div>

                            {/* Meta Data (Time & Status) */}
                            <div className="flex items-center gap-1.5 px-1 text-[11px] text-gray-400 dark:text-gray-500 font-medium">
                                <span>{formatTime(msg.timestamp)}</span>
                                {msg.sender === 'user' && (
                                <span className="text-red-500/80 dark:text-red-400/80">
                                    {msg.status === 'sent' && <Icon name="Check" size={14} className="text-gray-400" />}
                                    {msg.status === 'delivered' && <Icon name="CheckCheck" size={14} className="text-gray-400" />}
                                    {msg.status === 'seen' && <Icon name="CheckCheck" size={14} className="text-blue-500 dark:text-blue-400" />}
                                </span>
                                )}
                            </div>
                            </div>

                            {/* User Avatar */}
                            {msg.sender === 'user' && (
                            <div className="w-8 h-8 sm:w-10 sm:h-10 shrink-0 rounded-full bg-gray-100 dark:bg-[#1f0b0b] border border-gray-200 dark:border-red-900/30 flex items-center justify-center text-gray-500 dark:text-gray-400 mt-auto mb-2 shadow-sm">
                                <Icon name="User" size={20} />
                            </div>
                            )}
                        </div>
                        ))}

                        {/* Typing Indicator */}
                        {isTyping && (
                        <div className="flex gap-4 justify-start animate-fade-in">
                            <div className="w-8 h-8 sm:w-10 sm:h-10 shrink-0 rounded-full bg-gradient-to-br from-red-100 to-red-200 dark:from-red-900/40 dark:to-[#2a0f0f] border border-red-200 dark:border-red-800 flex items-center justify-center text-red-600 dark:text-red-400 mt-auto mb-2">
                            <Icon name="Bot" size={20} />
                            </div>
                            <div className="bg-white dark:bg-[#1a0a0a] border border-gray-100 dark:border-red-900/30 rounded-2xl rounded-bl-sm px-4 py-3 flex items-center gap-1.5 h-[46px]">
                            <span className="w-2 h-2 bg-red-400 rounded-full animate-bounce" style={{ animationDelay: '0ms' }}></span>
                            <span className="w-2 h-2 bg-red-400 rounded-full animate-bounce" style={{ animationDelay: '150ms' }}></span>
                            <span className="w-2 h-2 bg-red-400 rounded-full animate-bounce" style={{ animationDelay: '300ms' }}></span>
                            </div>
                        </div>
                        )}
                        
                        <div ref={messagesEndRef} />
                    </div>
                    </div>

                    {/* --- Input Area --- */}
                    <div className="absolute bottom-0 left-0 w-full bg-gradient-to-t from-white via-white/95 to-transparent dark:from-[#0c0404] dark:via-[#0c0404]/95 pt-10 pb-4 sm:pb-6 px-4 sm:px-6 z-20">
                    <div className="max-w-4xl mx-auto">
                        
                        {/* Attachment Previews */}
                        {attachments.length > 0 && (
                        <div className="flex items-center gap-3 overflow-x-auto py-3 px-2 mb-2 custom-scrollbar">
                            {attachments.map((att) => (
                            <div key={att.id} className="relative shrink-0 group animate-slide-in">
                                {att.type === 'image' ? (
                                <div className="w-16 h-16 rounded-xl overflow-hidden border-2 border-red-500/20 shadow-sm relative">
                                    <img src={att.url} alt="preview" className="w-full h-full object-cover" />
                                    <div className="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 transition-opacity" />
                                </div>
                                ) : (
                                <div className="w-16 h-16 rounded-xl bg-red-50 dark:bg-[#1f0b0b] border-2 border-red-500/20 shadow-sm flex flex-col items-center justify-center p-1 relative">
                                    <Icon name="FileText" size={24} className="text-red-500 dark:text-red-400 mb-1" />
                                    <span className="text-[9px] text-center w-full truncate font-medium text-gray-600 dark:text-gray-300 px-1">{att.name}</span>
                                    <div className="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 transition-opacity rounded-xl" />
                                </div>
                                )}
                                <button 
                                onClick={() => removeAttachment(att.id)}
                                className="absolute -top-2 -right-2 bg-red-100 dark:bg-gray-800 text-red-600 dark:text-red-400 rounded-full shadow-md hover:bg-red-200 dark:hover:bg-gray-700 transition-colors p-0.5"
                                >
                                <Icon name="XCircle" size={18} className="text-white dark:text-[#0c0404]" />
                                </button>
                            </div>
                            ))}
                        </div>
                        )}

                        {/* Input Box */}
                        <form 
                        onSubmit={handleSend}
                        className="relative flex items-end gap-2 bg-white dark:bg-[#150707] border border-gray-200 dark:border-red-900/40 rounded-3xl p-2 sm:p-2.5 shadow-lg shadow-gray-100/50 dark:shadow-red-900/10 focus-within:ring-2 focus-within:ring-red-500/20 focus-within:border-red-300 dark:focus-within:border-red-700/50 transition-all"
                        >
                        {/* Hidden File Inputs */}
                        <input 
                            type="file" 
                            ref={fileInputRef} 
                            onChange={handleFileUpload} 
                            className="hidden" 
                            multiple 
                            accept=".pdf,.doc,.docx,.txt"
                        />
                        <input 
                            type="file" 
                            ref={imageInputRef} 
                            onChange={handleFileUpload} 
                            className="hidden" 
                            multiple 
                            accept="image/*"
                        />

                        {/* Attachment Buttons */}
                        <div className="flex items-center gap-1 pb-1 pl-1">
                            <button 
                            type="button"
                            onClick={() => fileInputRef.current?.click()}
                            className="p-2 rounded-full text-gray-400 hover:text-red-600 hover:bg-red-50 dark:hover:bg-red-900/30 dark:hover:text-red-400 transition-colors group relative"
                            title="Attach File"
                            >
                            <Icon name="Paperclip" size={20} />
                            </button>
                            <button 
                            type="button"
                            onClick={() => imageInputRef.current?.click()}
                            className="p-2 rounded-full text-gray-400 hover:text-red-600 hover:bg-red-50 dark:hover:bg-red-900/30 dark:hover:text-red-400 transition-colors hidden sm:block"
                            title="Attach Image"
                            >
                            <Icon name="ImageIcon" size={20} />
                            </button>
                        </div>

                        {/* Textarea */}
                        <textarea
                            value={inputValue}
                            onChange={(e) => {
                            setInputValue(e.target.value);
                            // Auto-resize logic
                            e.target.style.height = 'auto';
                            e.target.style.height = Math.min(e.target.scrollHeight, 150) + 'px';
                            }}
                            onKeyDown={(e) => {
                            if (e.key === 'Enter' && !e.shiftKey) {
                                e.preventDefault();
                                handleSend(e);
                            }
                            }}
                            placeholder="Message CrimsonAI..."
                            className="flex-1 max-h-[150px] min-h-[44px] bg-transparent border-0 focus:outline-none resize-none py-3 px-2 text-gray-800 dark:text-gray-100 placeholder-gray-400 dark:placeholder-gray-500 text-[15px] custom-scrollbar leading-relaxed"
                            rows="1"
                        />

                        {/* Send Button */}
                        <button
                            type="submit"
                            disabled={!inputValue.trim() && attachments.length === 0}
                            className={`
                            p-3 rounded-full shrink-0 transition-all duration-200 mb-0.5 mr-0.5
                            ${(inputValue.trim() || attachments.length > 0) 
                                ? 'bg-gradient-to-r from-red-600 to-red-700 text-white shadow-md hover:shadow-lg shadow-red-600/30 hover:-translate-y-0.5' 
                                : 'bg-gray-100 dark:bg-[#1f0b0b] text-gray-400 dark:text-gray-600 cursor-not-allowed'
                            }
                            `}
                        >
                            <Icon name="Send" size={18} className={(inputValue.trim() || attachments.length > 0) ? 'translate-x-0.5 -translate-y-0.5' : ''} />
                        </button>
                        </form>
                        <div className="text-center mt-2">
                        <span className="text-[10px] text-gray-400 dark:text-gray-600">
                            CrimsonAI can make mistakes. Consider verifying important information.
                        </span>
                        </div>
                    </div>
                    </div>

                </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
